version: '3.8'

x-airflow-common: &airflow-common
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow_db
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__FERNET_KEY: 'your-fernet-key-here'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    PYTHONPATH: /opt/airflow
    DB_HOST: weather_postgres
    DB_PORT: '5432'
    DB_NAME: weather_db
    DB_USER: de_user
    DB_PASSWORD: de_password
    WAQI_TOKEN: 977f8b39c7d24a286bd37c945933f5fb0a3b8201
    _PIP_ADDITIONAL_REQUIREMENTS: psycopg2-binary requests python-dotenv pyspark dbt-core dbt-postgres

services:
  weather_postgres:
    image: postgres:15
    container_name: weather_postgres
    environment:
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_password
      POSTGRES_DB: weather_db
    ports:
      - "5432:5432"
    volumes:
      - weather_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "de_user" ]
      interval: 5s
      retries: 5

  airflow_postgres:
    image: postgres:15
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow_db
    ports:
      - "5433:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 5s

  airflow-init:
    <<: *airflow-common
    image: apache/airflow:2.8.0
    container_name: airflow_init
    depends_on:
      airflow_postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    volumes:
      - ./dags:/opt/airflow/dags

  airflow-webserver:
    <<: *airflow-common
    image: apache/airflow:2.8.0
    container_name: airflow_webserver
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    command: webserver
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./ingestion:/opt/airflow/ingestion
      - ./dbt_project:/opt/airflow/dbt_project
      - ./.env:/opt/airflow/.env

  airflow-scheduler:
    <<: *airflow-common
    image: apache/airflow:2.8.0
    container_name: airflow_scheduler
    depends_on:
      - airflow-init
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./ingestion:/opt/airflow/ingestion
      - ./dbt_project:/opt/airflow/dbt_project
      - ./.env:/opt/airflow/.env

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: weather_db
      MB_DB_PORT: 5432
      MB_DB_USER: de_user
      MB_DB_PASS: de_password
      MB_DB_HOST: weather_postgres
    depends_on:
      - weather_postgres
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1" ]
      interval: 10s

volumes:
  weather_postgres_data:
  airflow_postgres_data:
