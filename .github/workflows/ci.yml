name: Data Pipeline CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "apache-airflow==2.8.0" --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.8.0/constraints-3.10.txt"
        pip install pyspark==3.5.0 pytest pytest-cov pytest-mock requests python-dotenv psycopg2-binary

    - name: Run PySpark & DAG Tests
      run: |
        pytest tests/ -v --cov=ingestion --cov=dags
      env:
        # Mock environment variables needed for local CI runs
        SPARK_MASTER: local[*]
        WAQI_TOKEN: "mock_token"
        SLACK_WEBHOOK_URL: "mock_url"
