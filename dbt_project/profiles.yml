weather_pipeline:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DB_HOST', 'localhost') }}"
      port: "{{ env_var('DB_PORT', '5432') | int }}"
      user: "{{ env_var('DB_USER', 'de_user') }}"
      password: "{{ env_var('DB_PASSWORD', 'de_password') }}"
      dbname: "{{ env_var('DB_NAME', 'weather_db') }}"
      schema: public
      threads: 4
      connect_timeout: 10
